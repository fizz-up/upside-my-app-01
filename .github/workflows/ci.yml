name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.11.6

      - name: Install locked dependencies
        run: |
          UV_EXCLUDE_NEWER="$(python -c "from datetime import datetime, timedelta, timezone; print((datetime.now(timezone.utc) - timedelta(days=7)).replace(microsecond=0).isoformat().replace('+00:00', 'Z'))")" \
            uv pip install --system --require-hashes -r requirements.lock

      - name: Run tests
        run: pytest --tb=short -q

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-demo-api:${{ github.sha }} .
